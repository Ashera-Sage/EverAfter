<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create new wedding events</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
    <div class="logo">
        <h2>EverAfter</h2>
    </div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
    </nav>
    <div class="create-container">
    <div class="create-card">
    <h2>Create New Wedding...</h2>
    <form action="/create-wedding" method="post">
        <label>Groom's Name</label>
        <input type="text" name="groom" required><br><br>
        <label>Bride's Name</label>
        <input type="text" name="bride" required><br><br>
        <label>Wedding Date</label>
        <input type="date" name="date" required><br><br>
        <label>Wedding Time</label>
        <input type="time" name="time" required><br><br>
        <label>Venue</label>
        <input type="text" name="venue" required><br><br>
        <label>Place</label>
        <input type="text" name="place" required><br><br>
        <label>Maximum Guests</label>
        <input type="number" name="guests" min="1" required><br><br>
        <label>Description</label>
        <textarea rows="4" name="description"></textarea><br><br>
        <button type="submit">Save</button>
    </form>
    </div>
    </div>
</body>
</html>
